name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - master
  schedule:
    # Rebuild every 30 minutes to pull fresh Notion content
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Build Next.js
        run: pnpm build
        env:
          # Notion API credentials are injected at build time so
          # getStaticProps / getServerSideProps can fetch content.
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .next --project-name=techempower
